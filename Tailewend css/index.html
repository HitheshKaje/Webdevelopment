<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
    <style type="text/tailwindcss">
    
        .btn {
          @apply text-white px-4 py-2 rounded-lg;
        }
    
        .btn-blue {
          @apply bg-blue-500 hover:bg-blue-700;
        }
    
        .btn-red {
          @apply bg-red-500 hover:bg-red-700;
        }
    
      </style>
</head>

<body>
    <div class="bg-violet-400 flex flex-col border border-red-500 p-80 justify-center items-center  h-4/5 w-9/12"
        id="container">
        <form>
            <label>Add items</label>
            <input class="bg-orange-400 hover:bg-black" type="text" id="name" name="name">
            <button id="btna" class="btn-blue hover:bg-green-400">Add</button>
            <button id="btnr"class="btn-red hover:bg-green-400">Remove</button>
        </form>
    </div>

</html>
