<!DOCTYPE html>
<html lang="en">
    <head>
        <title>More elements</title>
        <meta charset="utf-8">
        <meta name="viewport"content="width=device-width,initial-scale=1.0">
    </head>
    <body>
            <h1>The form elements</h1>
                <form>
                    <label for="name">NAME</label>
                    <input type="text"id="name"name="name"><br><br>
                    <label for="phone">PHONE</label>
                    <input type="tel"id="phone"name="phone"><br><br>
                    <label for="pwd">PASSWORD</label>
                    <input type="password"id="pwd"name="password"><br><br>
                    <label for="cpwd">Confirm Password</label>
                    <input type="password"id="cpwd"name="password"><br><br>
                    Choose your Gender <br><br>
                    <label for="male">MALE</label>
                    <input type="radio"id="Male"name="gender">
                    <label for="female">FEMALE</label>
                    <input type="radio" id="female" name="gender">
                    <label for="other">OTHER</label>
                    <input type="radio" id="other" name="gender"><br><br>
                    Choose your hobby<br><br>
                    <input type="checkbox"id="playing"name="playing">
                    <label for="playing">Playing</label>
                    <input type="checkbox" id="dancing" name="dancing">
                    <label for="dancing">Dancing</label>
                    <input type="checkbox" id="singing" name="singing">
                    <label for="singing">Singing</label><br><br>
                    Choose your city<br><br><select id="city"name="city">
                        <option value="delhi">Delhi</option>
                        <option value="dk">dk</option>
                        <option value="ck">ck</option>
                        <option value="mk">mk</option>
                        <option value="nk">nk</option>
                    </select><br><br>
                    <label for="message">Message</label><br><br>
                    <textarea id="message"name="message">
                    </textarea><br><br>
                    <input type="submit"value="register">
                </form>
    </body>
</html>
