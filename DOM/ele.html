<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eleements</title>
</head>
<body> 
    <div class="container">
        <div class="box">Box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
        <button onclick="something()"> something</button>
    </div>
    <script>

        function something(){
            let magic=Array.from(document.getElementsByClassName("box"));
            for(element of magic){
            //  console.log(magic[0])
            element.innerHTML="This is"+element.innerHTML
        }
    }
    </script>
    
</body>
</html>
