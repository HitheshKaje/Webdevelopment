<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break and continue

    </title>
    <script>
       let index=0;
       while(index<=10){
           index++;
        if(index==5){
            continue;
        }     
        console.log(index)
    }
    </script>
</head>

</body>
