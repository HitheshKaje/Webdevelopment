<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trsns</title>
    <style>
        .conatiner{
            background-color: antiquewhite;
            width:100vw;
            height: 100vh;
        }
        .box{
            background-color: yellowgreen;
            width: 40vw;
            height: 30vh;
            transition: transform;
            transition-duration:3s ;
            transition-timing-function:ease ;
            transition-delay:1s ;
            transition: cubic-bezier(0.075, 0.82, 0.165, 1);
        }
        .translate{
            transform: translatex(60%) translate(50%);
        }
    </style>
</head>
<body>
    <div class="conatiner">
        <div class="box translate">Box1</div>
    </div>
    
</body>
</html>
