<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        .container{
            width:514px;
            height: 144px;
                border: 2px solid rgb(68, 18, 177);
                position: static;
                

        }
        .box{
            width: 194px;
            height: 114px;
            border:2px solid red;
            background-color: rgb(10, 200, 200);
            position: relative;
            top: 34px;
            left: 38px;
            bottom: 20px;
            top: 34px;
            margin: 45px;
            z-index: 10;

        }
        .one{
            width: 144px;
            height: 144px;
            border: solid gold;
            position: relative;
            top: 34px;
            right: 535px;
            background-color: violet;
            z-index:10;
        }
    </style>
</head>
<body>
     <div class="container">

    <div class="box">
        hii</div>
        <div class="one">hello</div>
</div>
    
    
</body>
</html>
