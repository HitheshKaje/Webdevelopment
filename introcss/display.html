<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        div{ background-color: red;
            border: 5px solid;
            margin-bottom: 10px;
            display: inline;
            


        }
        span{
            border: 3px solid rgb(114, 137, 250);
            margin-bottom: 20px;
            background-color: aqua;
            display: block;
            display: inline-block;
            /* display: none; */
            width: 35vw;

        }
    </style>
</head>
<body>
    <h1>Display</h1>
    <div>I am a div</div>
    <span>i am span 2</span>
    <span>i am span 3</span>
    
</body>
</html>
